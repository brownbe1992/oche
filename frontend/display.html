<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Oche — Scoreboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --board:#0e0f0d; --surface:#1a1c18; --surface-2:#212420; --wire:#3a3d38;
    --cream:#efe7d2; --ink:#f3efe4; --muted:#9a9387;
    /* --green/--bust brightened from #1b8a3a/#e2473d so they pass 4.5:1 as text on
       --board/--surface (docs/accessibility-roadmap.md contrast audit) — matches
       index.html's :root, kept in sync. --red stays border/background-only here
       (no text usage in this file), so it's unchanged. */
    --red:#c8102e; --green:#2fa050; --gold:#d9b46a; --bust:#ea6058;
  }
  /* Colorblind-friendly palette, set from Settings -> Accessibility (see index.html
     for the full rationale). Covers the dart border-colors below via the variables;
     the bust/win flash overlay and dart text colors are hardcoded tints, not
     variable-based, so they're overridden explicitly further down. */
  body.colorblind{
    --red:#e2711d;    /* orange, replaces double/treble red */
    --green:#2f8fd9;  /* blue, replaces treble/board green */
  }
  *{box-sizing:border-box;margin:0}
  html,body{height:100%}
  body{
    background:radial-gradient(120% 90% at 50% -10%, #1b1d19 0%, var(--board) 60%);
    color:var(--ink); font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; height:100vh; overflow:hidden;
    display:flex; flex-direction:column; padding:2.2vmin 2.6vmin;
    font-feature-settings:"tnum" 1;
  }

  /* ---- top bar ---- */
  .top{display:flex;align-items:center;gap:2vmin;padding-bottom:1.6vmin;border-bottom:1px solid var(--wire);flex:none}
  /* Portrait: a narrow viewport crowds brand+format+stats+live onto one line —
     wrap instead of letting them get clipped or overlap. */
  body.orientation-portrait .top{flex-wrap:wrap;row-gap:1vmin}
  body.orientation-portrait .game-stats{margin-left:0}
  body.orientation-portrait .live{margin-left:auto}
  .brand{font-family:'Bebas Neue';font-size:4.4vmin;line-height:.8;letter-spacing:.06em;color:var(--cream)}
  .fmt{color:var(--muted);font-size:2.1vmin;letter-spacing:.02em}
  .fmt b{color:var(--ink);font-weight:600}
  /* game stats (180s + BF) — right side of top bar */
  .game-stats{display:flex;gap:2.4vmin;align-items:center;margin-left:auto}
  .game-stats.hidden{display:none!important}
  .gs-item{display:flex;align-items:center;gap:.5vmin;color:var(--muted);font-size:2vmin}
  .gs-val{font-family:'Bebas Neue';font-size:3.2vmin;color:var(--cream);letter-spacing:.03em}
  .live{margin-left:2vmin;display:flex;align-items:center;gap:1vmin;color:var(--muted);font-size:1.7vmin;text-transform:uppercase;letter-spacing:.12em}
  .dot{width:1.3vmin;height:1.3vmin;border-radius:50%;background:var(--green);box-shadow:0 0 1.4vmin var(--green)}
  .dot.off{background:var(--bust);box-shadow:none;animation:none}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .dot{animation:pulse 2s ease-in-out infinite}

  /* ---- checkout strip ---- */
  .co-strip{flex:none;display:flex;align-items:center;gap:2.4vmin;
    padding:1vmin 2.6vmin;
    background:linear-gradient(90deg,rgba(217,180,106,.15) 0%,rgba(217,180,106,.04) 100%);
    border-bottom:1px solid rgba(217,180,106,.3)}
  .co-strip.hidden{display:none!important}
  .co-strip-label{font-size:1.5vmin;text-transform:uppercase;letter-spacing:.16em;color:var(--gold);font-weight:700;flex:none}
  .co-strip-route{font-family:'Bebas Neue';font-size:5.5vmin;line-height:.85;color:var(--cream);letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .co-strip-who{font-size:1.8vmin;color:var(--muted);flex:none;white-space:nowrap}
  @keyframes costrip-flash{0%{background:rgba(217,180,106,.35)}100%{background:rgba(217,180,106,.15)}}
  .co-strip.flashpulse{animation:costrip-flash .6s ease-out}

  /* ---- player grid ---- */
  .grid{flex:1;display:grid;gap:2vmin;padding:2vmin 0;min-height:0}
  .pcard{position:relative;background:var(--surface);border:1px solid var(--wire);border-radius:2vmin;
    padding:2.4vmin 2.8vmin;display:flex;flex-direction:column;justify-content:space-between;min-height:0;overflow:hidden}
  .pcard.active{border-color:var(--gold);box-shadow:inset 0 0 0 .35vmin var(--gold), 0 0 6vmin rgba(217,180,106,.12)}
  .prow1{display:flex;align-items:baseline;gap:1.4vmin}
  .pname{font-weight:600;font-size:3.6vmin;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ptag{font-size:1.5vmin;font-weight:700;letter-spacing:.08em;color:var(--gold);border:1px solid var(--wire);border-radius:.8vmin;padding:.5vmin .9vmin;flex:none}
  .throwflag{margin-left:auto;font-size:1.7vmin;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);flex:none}
  .score{font-family:'Bebas Neue';font-size:clamp(56px, 17vmin, 280px);line-height:.78;color:var(--cream);letter-spacing:.01em;margin:.4vmin 0 .2vmin}
  .pcard.active .score{color:#fff}
  /* Compact/Minimal free up card space by dropping rows below — let the score grow into it */
  body.layout-compact .score{font-size:clamp(64px, 20vmin, 320px)}
  body.layout-minimal .score{font-size:clamp(72px, 24vmin, 360px)}
  .dart-counts{display:flex;flex-direction:column;gap:.2vmin;margin-bottom:.6vmin}
  .dart-counts-title{color:var(--muted);font-size:1.4vmin;text-transform:uppercase;letter-spacing:.12em;font-weight:600;margin-bottom:.3vmin}
  .dart-count-row{display:flex;align-items:baseline;gap:.8vmin;font-size:1.9vmin}
  .dart-count-val{font-family:'Bebas Neue';font-size:2.6vmin;color:var(--cream);letter-spacing:.02em;line-height:1}
  .dart-count-lbl{color:var(--muted);font-size:1.6vmin;text-transform:uppercase;letter-spacing:.07em}
  .meta{display:flex;gap:2.4vmin;align-items:center;color:var(--muted);font-size:2vmin;flex-wrap:wrap}
  .meta b{color:var(--ink);font-weight:600}
  .standing{margin-left:auto;color:var(--gold);font-weight:700;letter-spacing:.04em;font-size:2vmin}

  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;
    clip:rect(0,0,0,0);white-space:nowrap;border:0}

  /* Traditional chalkboard cricket scorecard — one shared table (rows=numbers,
     columns=players), not per-player cards. Marks render as a slash (1), an X (2),
     and a circled X (3/closed) — the circle is the non-color-only "closed" signal
     required by docs/accessibility-roadmap.md, not color alone. */
  .cs-wrap{flex:1;display:flex;flex-direction:column;min-height:0;padding:1vmin 0;gap:1.6vmin}
  .cs-table{display:flex;flex-direction:column;border:1px solid var(--wire);border-radius:1.4vmin;overflow:hidden;background:var(--surface)}
  .cs-row{display:grid;grid-template-columns:minmax(9vmin,14vmin) repeat(var(--cs-cols,2),1fr);
    border-bottom:1px solid var(--wire)}
  .cs-row:last-child{border-bottom:none}
  .cs-label,.cs-cell,.cs-col-head{display:flex;align-items:center;justify-content:center;
    padding:1.2vmin .6vmin;min-width:0}
  .cs-label{font-family:'Bebas Neue';font-size:2.6vmin;color:var(--muted);justify-content:flex-start;padding-left:1.6vmin}
  .cs-head .cs-col-head{font-weight:600;font-size:2.2vmin;color:var(--cream);gap:.6vmin;flex-direction:column;line-height:1.15}
  .cs-head{background:var(--surface-2)}
  .cs-col-head.active{color:var(--gold)}
  .cs-throw-chip{font-size:1.5vmin;letter-spacing:.1em;color:var(--gold);text-transform:uppercase}
  .cs-cell{border-left:1px solid var(--wire)}
  .cs-col-head{border-left:1px solid var(--wire)}
  .cs-cell.active,.cs-col-head.active{background:rgba(217,180,106,.08)}
  .cs-mark{font-family:'Bebas Neue';font-size:3.4vmin;line-height:1;color:var(--muted)}
  .cs-mark-2{color:var(--cream)}
  .cs-mark-3{display:flex;align-items:center;justify-content:center;width:5vmin;height:5vmin;
    border:.3vmin solid var(--green);border-radius:50%;color:var(--green);font-size:2.6vmin}
  body.colorblind .cs-mark-3{border-color:#9cd2ff;color:#9cd2ff}
  .cs-foot{background:var(--surface-2)}
  .cs-foot .cs-label{color:var(--gold)}
  .cs-points{font-family:'Bebas Neue';font-size:3.4vmin;color:var(--cream)}
  .cs-points.active{color:#fff}
  .cs-throw-row{flex:none;display:flex;align-items:center;gap:2vmin}
  .cs-throw-lbl{font-size:2vmin;color:var(--muted);flex:none}
  .cs-throw-lbl b{color:var(--gold)}
  .cs-throw-row .darts{flex:1}

  /* Just Chuckin' It: dartboard heatmap alongside the session stats — side by
     side in landscape (plenty of width, since this mode is always solo so the
     card already spans the whole grid), stacked in portrait (same orientation-
     awareness convention as the rest of this file, item 11). */
  .chuckin-layout{display:flex;gap:2.8vmin;flex:1;min-height:0;align-items:center}
  body.orientation-portrait .chuckin-layout{flex-direction:column;align-items:stretch}
  .chuckin-stats{flex:1;display:flex;flex-direction:column;justify-content:center;min-width:0}
  .chuckin-board{flex:none;width:40vmin;max-width:44%}
  body.orientation-portrait .chuckin-board{width:100%;max-width:62vmin;margin:0 auto}
  .chuckin-board svg{width:100%;height:auto;display:block}

  /* darts in hand + checkout */
  .throwbox{margin-top:1.6vmin;border-top:1px dashed var(--wire);padding-top:1.6vmin;display:flex;flex-direction:column;gap:1.2vmin}
  .darts{display:flex;gap:1.2vmin}
  .checkout{display:flex;align-items:center;gap:1.6vmin;background:linear-gradient(180deg,rgba(217,180,106,.16),rgba(217,180,106,.05));
    border:1px solid var(--gold);border-radius:1.2vmin;padding:1.2vmin 1.8vmin}
  .checkout .lab{font-size:1.6vmin;text-transform:uppercase;letter-spacing:.14em;color:var(--gold);font-weight:700;flex:none}
  .checkout .route{font-family:'Bebas Neue';font-size:4.2vmin;line-height:.85;color:var(--cream);letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dart{flex:1;background:var(--surface-2);border:1px solid var(--wire);border-radius:1.2vmin;height:6.5vmin;
    display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:3.4vmin;letter-spacing:.03em}
  .dart.empty{color:#4d514a;font-family:'Inter';font-size:1.7vmin}
  .dart.t{border-color:var(--green);color:#7fe0a0}
  .dart.d{border-color:var(--red);color:#ff8a93}
  body.colorblind .dart.t{color:#9cd2ff}
  body.colorblind .dart.d{color:#ffb570}

  /* status flash on a card (bust / game shot) */
  .flash{position:absolute;top:0;right:0;bottom:0;left:0;display:flex;align-items:center;justify-content:center;
    font-family:'Bebas Neue';font-size:8vmin;letter-spacing:.06em;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}
  .flash.bust{background:rgba(234,96,88,.22);color:#ffb4ad}
  .flash.shot{background:rgba(47,160,80,.22);color:#9bf0ba}
  body.colorblind .flash.bust{background:rgba(226,113,29,.22);color:#ffb570}
  body.colorblind .flash.shot{background:rgba(47,143,217,.22);color:#9cd2ff}

  /* full-screen banner for leg/set/game results */
  .banner{position:fixed;top:0;right:0;bottom:0;left:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:1vmin;
    background:rgba(8,9,7,.86);z-index:20;text-align:center;padding:6vmin}
  .banner.show{display:flex;animation:fade .3s ease both}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .banner .big{font-family:'Bebas Neue';font-size:11vmin;line-height:.85;color:var(--gold);letter-spacing:.03em}
  .banner .sub{font-size:3vmin;color:var(--muted)}

  /* idle */
  .idle{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.6vmin;text-align:center}
  .idle .mk{font-family:'Bebas Neue';font-size:9vmin;color:var(--cream);letter-spacing:.05em}
  .idle .ln{color:var(--muted);font-size:2.6vmin}
  .hidden{display:none!important}

  /* match bar (sets/legs standings, H2H only) — in-flow, below the top bar, so it
     never overlaps a player's card the way the old fixed-position corner panel did.
     Boxed stat chips are borrowed from broadcast dart scoreboards. */
  .matchbar{flex:none;display:flex;flex-direction:column;gap:.8vmin;
    padding:1.2vmin 2.6vmin;background:var(--surface);border-bottom:1px solid var(--wire)}
  .matchbar.hidden{display:none!important}
  .mb-row{display:flex;align-items:center;gap:1.6vmin;padding-left:1vmin;border-left:.4vmin solid transparent}
  .mb-row.active{border-left-color:var(--gold)}
  .mb-name{font-weight:600;font-size:2.3vmin;color:var(--ink);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mb-row.active .mb-name{color:#fff}
  .mb-turn{color:var(--gold);font-size:1.7vmin;flex:none;width:1.6vmin}
  .mb-stats{display:flex;gap:1vmin;flex:none}
  .mb-stat{display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-width:6.5vmin;padding:.4vmin .8vmin;border-radius:.8vmin;background:var(--surface-2);border:1px solid var(--wire)}
  .mb-row.active .mb-stat{border-color:var(--gold)}
  .mb-stat .v{font-family:'Bebas Neue';font-size:2.8vmin;color:var(--cream);letter-spacing:.02em;line-height:1}
  .mb-stat .l{font-size:1.15vmin;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600;margin-top:.2vmin}

  /* leg summary cards (shown between legs) */
  .sum-card{position:relative;background:var(--surface);border:1px solid var(--wire);border-radius:2vmin;
    padding:3vmin 3.2vmin;display:flex;flex-direction:column;gap:2.4vmin;justify-content:center;overflow:hidden}
  .sum-card.winner{border-color:var(--gold);box-shadow:inset 0 0 0 .35vmin var(--gold),0 0 6vmin rgba(217,180,106,.12)}
  .sum-name{font-weight:600;font-size:3.6vmin;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sum-crown{font-size:3.2vmin;margin-left:.8vmin}
  .sum-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1.6vmin 2vmin}
  .sum-stat{display:flex;flex-direction:column;gap:.4vmin}
  .sum-stat .sv{font-family:'Bebas Neue';font-size:6.5vmin;line-height:.85;color:var(--cream);letter-spacing:.02em}
  .sum-stat .sl{font-size:1.7vmin;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600}
  .sum-card.winner .sum-stat .sv{color:#fff}

  /* achievement flash overlay */
  .ach-overlay{position:fixed;top:0;right:0;bottom:0;left:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    gap:1.8vmin;background:rgba(8,9,7,.82);z-index:30;text-align:center;pointer-events:none;overflow:hidden}
  .ach-overlay.show{display:flex;animation:achpop .35s ease both}
  .ach-overlay.mega{background:rgba(8,9,7,.92)}
  @keyframes achpop{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
  .ach-text{font-family:'Bebas Neue';font-size:16vmin;line-height:.85;color:var(--cream);letter-spacing:.04em}
  .ach-overlay.mega .ach-text{font-size:21vmin;color:var(--gold);text-shadow:0 0 6vmin rgba(217,180,106,.5);animation:achmegapulse 1.1s ease-in-out infinite}
  @keyframes achmegapulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  .ach-name{font-size:3.5vmin;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
  .ach-overlay.mega .ach-name{font-size:4.4vmin;color:var(--cream)}
  .ach-desc{font-size:2.2vmin;color:var(--muted);max-width:70vmin;line-height:1.4;margin-top:.5vmin}
  .ach-desc:empty{display:none}
  .ach-count{font-size:2vmin;font-weight:700;color:var(--gold);letter-spacing:.04em;text-transform:uppercase}
  .ach-count:empty{display:none}
  .confetti{position:absolute;top:-10vh;width:1.1vmin;height:2.4vmin;opacity:.95;border-radius:1px;animation:confetti-fall linear forwards;pointer-events:none}
  @keyframes confetti-fall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(120vh) rotate(560deg);opacity:.85}}
</style>
</head>
<body>
  <div class="top">
    <div class="brand">OCHE</div>
    <div class="fmt" id="fmt"></div>
    <div class="game-stats hidden" id="game-stats">
      <span class="gs-item">🎯 <span class="gs-val" id="stat-180s">0</span></span>
      <span class="gs-item">🐟 <span class="gs-val" id="stat-bf">0</span></span>
      <span class="gs-item">💥 <span class="gs-val" id="stat-busts">0</span></span>
    </div>
    <div class="live"><span class="dot" id="dot"></span><span id="livetext">live</span></div>
  </div>

  <div class="matchbar hidden" id="matchbar"></div>

  <div class="co-strip hidden" id="co-strip">
    <span class="co-strip-label">Checkout</span>
    <span class="co-strip-route" id="co-strip-route"></span>
    <span class="co-strip-who" id="co-strip-who"></span>
  </div>

  <div class="grid" id="grid"></div>

  <div class="idle" id="idle">
    <div class="mk">SCOREBOARD READY</div>
    <div class="ln">Waiting for a game to start on the controller…</div>
  </div>

  <div class="banner" id="banner">
    <div class="big" id="banner-big"></div>
    <div class="sub" id="banner-sub"></div>
  </div>

  <div class="ach-overlay" id="ach-overlay">
    <div class="ach-text" id="ach-text"></div>
    <div class="ach-name" id="ach-name"></div>
    <div class="ach-desc" id="ach-desc"></div>
    <div class="ach-count" id="ach-count"></div>
  </div>

<script>
const grid       = document.getElementById('grid');
const idle       = document.getElementById('idle');
const fmtEl      = document.getElementById('fmt');
const dot        = document.getElementById('dot');
const liveTx     = document.getElementById('livetext');
const banner     = document.getElementById('banner');
const achOverlay = document.getElementById('ach-overlay');
const achText    = document.getElementById('ach-text');
const achName    = document.getElementById('ach-name');
const achDesc    = document.getElementById('ach-desc');
const achCount   = document.getElementById('ach-count');

const gameStats  = document.getElementById('game-stats');
const stat180s   = document.getElementById('stat-180s');
const statBF     = document.getElementById('stat-bf');
const statBusts  = document.getElementById('stat-busts');

const coStrip    = document.getElementById('co-strip');
const coRoute    = document.getElementById('co-strip-route');
const coWho      = document.getElementById('co-strip-who');

const matchbar   = document.getElementById('matchbar');

let bannerKey = '';
let lastAchTs = 0;
// docs/archive/achievements-badges-roadmap.md's live-overlay count item: the recurring-
// badge count arrives in a second /api/live push with the SAME ts (the overlay
// fired before the award round-trip resolved) — tracked separately from
// lastAchTs so that second push can patch just the count text in place instead
// of being ignored by the ts-dedup, or restarting the whole reveal animation.
let lastAchCountText = '';
let lastCoKey = '';   // track checkout route to flash only on change
let bannerTimer = null;
let achTimer = null;

const ACH_LABELS  = { '180':'180! 🎯', 'bigfish':'Big Fish! 🐟', 'ninedarter':'🏆 NINE-DARTER! 🏆',
  hattrick:'Hat Trick! 🎩', bullseyegauntlet:'Bullseye Gauntlet! 🔴', wherediditgo:"Where'd It Go? 💨",
  socloseshot:'So Close... 😩', tontitled:'Ton-titled to Nothing 😅', nightowl:'Night Owl 🦉',
  earlybird:'Early Bird 🐦', first100checkout:'First 100+ Checkout! 🥇',
  metronome:'Metronome! 🎯', cruisecontrol:'Cruise Control 🚗', iceintheveins:'Ice in the Veins ❄️',
  nervesofsteel:'Nerves of Steel 🧊', comebackkid:'Comeback Kid 🔥', giantslayer:'Giant Slayer 🗡️',
  grudgematch:'Grudge Match ⚔️', therematch:'The Rematch 🔁', aroundtheclock:'Around the Clock 🕐',
  aroundtheworld:'Around the World! 🌍', doubletrouble:'Double Trouble! 👯', bustedmaximum:'Busted Maximum 💥',
  cricket9marks:'9 Marks! 🎯', cricketperfectclose:'🏆 PERFECT LEG! 🏆',
  cricketwhitewash:'Whitewash! 🧹', cricketcomebackkid:'Comeback Kid! 🔥',
  challengeweek:'Challenge Streak: Week! 🔥', challengemonth:'🏆 CHALLENGE STREAK: MONTH! 🏆',
  challengeallformats:'Full Rotation! 🗓️', nocigar:'No Cigar 🤦', chuckin180:'180! 🎯',
  staircasefinish:'Staircase Finish! 🪜', ghostslayer:'Ghost Slayer! 👻',
  tournamentchampion:'🏆 CHAMPION! 🏆', tournamentgiantslayer:'Giant Slayer ⚔️',
  // Mirror-copied from frontend/index.html's ACH_LABELS — these five (plus the
  // guided_clock/guided_world pair below) were previously missing here entirely,
  // found while adding cricketstonecold and checking this file stayed in sync
  // (docs/bug-roadmap.md — the same class of gap Ring Master's own ACH_LABELS
  // omission was, see docs/archive/culture-badges-roadmap.md Part B). A missing
  // entry here means the live overlay's headline renders blank on the /display

/* ---- layout presets ----
   Chosen by the admin in Settings (or overridden per-screen with ?layout=...
   in the URL, e.g. for a small screen that wants Compact regardless of the
   site-wide default). Checkout suggestions, achievement flashes, and the
   match bar always show — they're small and are the whole point of a
   "resource for checkouts" screen — only the denser stat rows are gated. */
const LAYOUTS = {
  full:    { showTag:true,  showDartCounts:true,  showMeta:true, showAverages:true,  showGameStats:true  },
  compact: { showTag:false, showDartCounts:false, showMeta:true, showAverages:false, showGameStats:false },
  minimal: { showTag:false, showDartCounts:false, showMeta:false,showAverages:false, showGameStats:false },
};
const layoutParam = new URLSearchParams(location.search).get('layout');
let layout = LAYOUTS[layoutParam] ? layoutParam : 'full';
document.body.classList.add('layout-'+layout);
if(!LAYOUTS[layoutParam]){
  fetch('/api/settings/scoreboard-layout', {cache:'no-store'}).then(r=>r.ok?r.json():null).then(s=>{
    if(s && LAYOUTS[s.layout] && s.layout !== layout){
      document.body.classList.remove('layout-'+layout);
      layout = s.layout;
      document.body.classList.add('layout-'+layout);
    }
  }).catch(()=>{});
}
fetch('/api/settings/colorblind-mode', {cache:'no-store'}).then(r=>r.ok?r.json():null).then(s=>{
  document.body.classList.toggle('colorblind', !!(s && s.enabled));
}).catch(()=>{});

/* ---- orientation detection ----
   A mounted tablet or spare phone can be portrait or landscape, and can be rotated
   mid-match — this isn't a one-time check at load. matchMedia's own change event
   fires for both an actual device rotation and a plain browser-window resize that
   crosses the portrait/landscape boundary, so it's the one listener needed (no
   separate orientationchange/resize handler required). The grid's column count
   (see render()) reads `isPortrait` directly; re-rendering the last snapshot on
   change means a rotation reshapes the board immediately, not on the next server
   push. See docs/archive/existing-app-prep-roadmap.md item 11. */
let lastSnapshot = null;
const portraitQuery = window.matchMedia('(orientation: portrait)');
let isPortrait = portraitQuery.matches;
document.body.classList.toggle('orientation-portrait', isPortrait);
portraitQuery.addEventListener('change', (e)=>{
  isPortrait = e.matches;
  document.body.classList.toggle('orientation-portrait', isPortrait);
  if(lastSnapshot) render(lastSnapshot);
});

function spawnConfetti(root, count){
  const colors=['#d9b46a','#efe7d2','#f4e3b2','#caa94e'];
  for(let i=0;i<count;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=(Math.random()*100)+'%';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration=(1.8+Math.random()*1.6)+'s';
    c.style.animationDelay=(Math.random()*0.6)+'s';
    root.appendChild(c);
    setTimeout(()=>c.remove(), 4500);
  }
}

function showAchievement(type, player, countText){
  achText.textContent = ACH_LABELS[type] || '';
  achName.textContent = player || '';
  if(achDesc) achDesc.textContent = ACH_DESC[type] || '';
  if(achCount) achCount.textContent = countText || '';
  const mega = type === 'ninedarter' || type === 'cricketperfectclose' || type === 'challengemonth' || type === 'tournamentchampion' || type === 'cricketstonecold' || type === 'bobs27fullanderson' || type === 'topofthehouse';
  achOverlay.classList.toggle('mega', mega);
  achOverlay.classList.add('show');
  if(mega) spawnConfetti(achOverlay, 90);
  clearTimeout(achTimer);
  achTimer = setTimeout(()=>{ achOverlay.classList.remove('show'); achOverlay.querySelectorAll('.confetti').forEach(c=>c.remove()); }, ACH_DURATION[type] || 2500);
}

function fmtText(s){
  const cat = s.category != null ? esc(s.category) : '';
  const legNo = num(s.legNo), setNo = num(s.setNo), lps = num(s.legsPerSet), spg = num(s.setsPerGame);
  // Tournament mode (docs/archive/tournament-mode-roadmap.md): a small addition to the
  // existing gameType-style snapshot fields — same shape as everything else
  // fmtText already reads off `s`, no new rendering path needed.
  const roundPrefix = s.tournamentRoundLabel ? `${esc(s.tournamentRoundLabel)} &nbsp;·&nbsp; ` : '';
  if(s.practice){
    return `${roundPrefix}<b>${cat}</b> &nbsp; Practice &nbsp;·&nbsp; Leg ${legNo}`;
  }
  const legs = lps>1 ? `first to ${lps} legs` : '1 leg';
  const sets = spg>1 ? `first to ${spg} sets · ` : '';
  const where = spg>1 ? `Set ${setNo} · Leg ${legNo}` : `Leg ${legNo}`;
  return `${roundPrefix}<b>${cat}</b> &nbsp; ${sets}${legs} &nbsp;·&nbsp; ${where}`;
}

function dartClass(label){
  if(!label) return 'empty';
  if(label[0]==='T') return 't';
  if(label[0]==='D' || label==='Bull') return 'd';
  return '';
}
