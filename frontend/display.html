// index.html, per the established convention for every other duplicated map
// above). Feeds buildChuckinLiveHeatmap() below.
const DB_SECTORS = [20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];
// Just Chuckin' It's live, session-only dartboard heatmap — mirror-copied from
// frontend/index.html's buildChuckinHeatmap() (the Player Profile's lifetime
// version), stripped of nothing structural: same geometry, same single-hue heat
// scale, same hover tooltips. `cells` is index.html's playerSnapshotChuckin()'s
// live {sector,multiplier,hits} array, gradually filling in as the session
// progresses, not a fetched lifetime dataset.
// docs/security-audit-roadmap.md SEC-18: c.hits (and c.sector/c.multiplier) come
// straight from the /api/live broadcast payload, whose per-player heatmap array
// ALLOWED_LIVE_KEYS deliberately leaves unrestricted in shape. Every other value
// pulled from that payload elsewhere in this file goes through num()/esc() before
// reaching the DOM — this is the one place a payload value was trusted as a safe
// number without coercion, and the result below is interpolated into <title>
// markup assigned via innerHTML, so an uncoerced string value here is a stored/
// broadcast XSS reaching every connected /display screen. Number(...)||0 coerces
// at the boundary, same pattern num() already applies everywhere else in this file.
function buildChuckinLiveHeatmap(cells){
  const hitMap = {}, missMap = {};
  let maxHits = 0, maxMiss = 0;
  // docs/bug-roadmap.md BUG-12: Array.isArray(), not just a `||[]` truthy check — a
  // non-array-but-truthy payload value (e.g. a crafted string) would pass `cells||[]`
  // unchanged and then throw on .forEach, same crash class as the sessionAvg fix
  // below. Matches the Array.isArray() guard every other live-payload array field in
  // this file already uses.
  (Array.isArray(cells) ? cells : []).forEach(c=>{
    const sector = Number(c.sector) || 0, mult = Number(c.multiplier) || 0, hitCount = Number(c.hits) || 0;
    // A positioned miss (sector 0 with a wedge + near/far depth) goes into its own
    // map on its own heat scale — same split buildDartHeatmap()'s lifetime board uses,
    // since miss counts and scoring-hit counts are wildly different population sizes.
    // missZone is constrained to a real 1-20 wedge and missDepth to 'near'/'far' at the
    // boundary (SEC-18 discipline); an unpositioned miss (Pad mode) has nothing to plot.
    if(sector === 0){
      const missZone = Number(c.missZone);
      const missDepth = (c.missDepth === 'near' || c.missDepth === 'far') ? c.missDepth : '';
      if(Number.isInteger(missZone) && missZone >= 1 && missZone <= 20 && missDepth){
        const mk = missZone+'_'+missDepth;
        missMap[mk] = hitCount;
        if(hitCount>maxMiss) maxMiss = hitCount;
      }
      return;
    }
    // docs/bug-roadmap.md BUG-20: singles are keyed by zone (inner/outer) too, so the
    // two single regions of a number shade independently instead of both lighting up
    // for any single hit. zone is normalized to only 'inner'/'outer' at the boundary
    // (anything else — a Pad-mode null, a pre-feature row, or a crafted payload value —
    // collapses to '' / zone-unspecified), the same SEC-18 "constrain the payload, don't
    // trust it" discipline this function already applies to sector/mult/hits, and
    // mirroring buildDartHeatmap()'s lifetime sector_mult_zone keying.
    const zone = (c.zone === 'inner' || c.zone === 'outer') ? c.zone : '';
    hitMap[sector+'_'+mult+'_'+zone] = hitCount;
    if(hitCount>maxHits) maxHits = hitCount;
  });
  const hits = (sector, m, zone) => hitMap[sector+'_'+m+'_'+(zone||'')] || 0;
  const heat = (sector, m, zone) => maxHits>0 ? hits(sector,m,zone)/maxHits : 0;
  const missHits = (wedge, depth) => missMap[wedge+'_'+depth] || 0;
  const missHeat = (wedge, depth) => maxMiss>0 ? missHits(wedge,depth)/maxMiss : 0;

  // CX/CY/viewBox enlarged to match buildDartHeatmap()'s lifetime geometry, leaving
  // room past the board (bg:248) for the two miss bands (missNear:270, missFar:310) —
  // the board proper (doubleOut:212) is unchanged, just no longer flush to the edge.
  const CX=330, CY=330;
  const R = { bullIn:20, bullOut:38, trebleIn:118, trebleOut:140, doubleIn:190, doubleOut:212, numAt:231, bg:248, missNear:270, missFar:310 };
  const DEG = 360/20;
  const xy = (r, deg) => { const a=(deg-90)*Math.PI/180; return [CX+r*Math.cos(a), CY+r*Math.sin(a)]; };
  const f = v => v.toFixed(2);
  const annulus = (r1, r2, s, e) => {
    const [x1,y1]=xy(r1,s),[x2,y2]=xy(r1,e),[x3,y3]=xy(r2,e),[x4,y4]=xy(r2,s);
    const lg=e-s>180?1:0;
    return `M${f(x1)},${f(y1)} A${r1},${r1} 0 ${lg},1 ${f(x2)},${f(y2)} L${f(x3)},${f(y3)} A${r2},${r2} 0 ${lg},0 ${f(x4)},${f(y4)} Z`;
  };
  const heatFill = t => {
    if(t<=0) return '#1c1e1a';
    const r = Math.round(28 + t*(217-28));
    const g = Math.round(30 + t*(180-30));
    const b = Math.round(26 + t*(106-26));
    return `rgb(${r},${g},${b})`;
  };
  let s = `<svg viewBox="0 0 660 660" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Live dartboard heatmap of this Just Chuckin' It session, including the outer miss ring">
    <circle cx="${CX}" cy="${CY}" r="${R.bg}" fill="#0d0e0b"/>
    <circle cx="${CX}" cy="${CY}" r="${R.doubleOut+1}" fill="#111210"/>
    <circle cx="${CX}" cy="${CY}" r="${R.doubleOut}" fill="#0d0e0b"/>`;
  DB_SECTORS.forEach((n,i)=>{
    const s0=i*DEG-DEG/2, e0=s0+DEG;
    const sw = 'stroke="#151613" stroke-width="0.5"';
    // BUG-20: inner and outer singles shade from their own zone-keyed counts, each
    // with its own tooltip — matching buildDartHeatmap()'s lifetime rendering. A
    // zone-unspecified single (Pad mode) is in neither 'inner' nor 'outer', so it
    // simply reads 0 on both here rather than lighting up both, the same deliberate
    // "don't plot a zone-less single" behavior the lifetime heatmap settled on.
    s += `<path d="${annulus(R.bullOut,R.trebleIn,s0,e0)}" fill="${heatFill(heat(n,1,'inner'))}" ${sw}><title>${n} (inner): ${hits(n,1,'inner')} hit${hits(n,1,'inner')===1?'':'s'}</title></path>`;
    s += `<path d="${annulus(R.trebleIn,R.trebleOut,s0,e0)}" fill="${heatFill(heat(n,3))}" ${sw}><title>T${n}: ${hits(n,3)} treble hit${hits(n,3)===1?'':'s'}</title></path>`;
    s += `<path d="${annulus(R.trebleOut,R.doubleIn,s0,e0)}" fill="${heatFill(heat(n,1,'outer'))}" ${sw}><title>${n} (outer): ${hits(n,1,'outer')} hit${hits(n,1,'outer')===1?'':'s'}</title></path>`;
    s += `<path d="${annulus(R.doubleIn,R.doubleOut,s0,e0)}" fill="${heatFill(heat(n,2))}" ${sw}><title>D${n}: ${hits(n,2)} double hit${hits(n,2)===1?'':'s'}</title></path>`;
    const [nx,ny]=xy(R.numAt,s0+DEG/2);
    s += `<text x="${f(nx)}" y="${f(ny)}" text-anchor="middle" dominant-baseline="central" font-family="Bebas Neue,sans-serif" font-size="17" fill="#efe7d2" style="pointer-events:none;user-select:none">${n}</text>`;
    // Miss ring (docs/archive/dartboard-zone-tracking-roadmap.md "Miss-area tracking") —
    // the two bands extending past the board, shaded by how many misses landed in that
    // wedge/depth this session, on their own independent heat scale. Mirrors
    // buildDartHeatmap()'s lifetime miss ring; only ever populated by a Dartboard-mode
    // positioned miss (a Pad-mode miss has no wedge/depth to plot).
    s += `<path d="${annulus(R.bg,R.missNear,s0,e0)}" fill="${heatFill(missHeat(n,'near'))}" ${sw}><title>Miss (near), wedge ${n}: ${missHits(n,'near')} miss${missHits(n,'near')===1?'':'es'}</title></path>`;
    s += `<path d="${annulus(R.missNear,R.missFar,s0,e0)}" fill="${heatFill(missHeat(n,'far'))}" ${sw}><title>Miss (far), wedge ${n}: ${missHits(n,'far')} miss${missHits(n,'far')===1?'':'es'}</title></path>`;
  });
  s += `<circle cx="${CX}" cy="${CY}" r="${R.bullOut}" fill="${heatFill(heat(25,1))}" stroke="#151613" stroke-width="0.5"><title>Bull: ${hits(25,1)} hit${hits(25,1)===1?'':'s'}</title></circle>`;
  s += `<circle cx="${CX}" cy="${CY}" r="${R.bullIn}" fill="${heatFill(heat(25,2))}" stroke="#151613" stroke-width="0.5"><title>Double Bull: ${hits(25,2)} hit${hits(25,2)===1?'':'s'}</title></circle>`;
  s += `<text x="${CX}" y="${CY}" text-anchor="middle" dominant-baseline="central" font-family="Bebas Neue,sans-serif" font-size="12" fill="#efe7d2" style="pointer-events:none;user-select:none">Bull</text>`;
  s += `</svg>`;
  return s;
}

// Compact progress grid for the two guided drills (docs/game-modes-roadmap.md
// "Guided Around the Clock / Around the World") — mirror-copied from
// frontend/index.html's buildOutcomeGridHtml() (this file has no shared module
// with index.html, per the established convention above). hitKeys is a plain
// array of `${sector}:${mult}` strings (Around the Clock always uses mult 1) —
// index.html's playerSnapshotAroundTheClock()/playerSnapshotAroundTheWorld()
// send hitNumbers/hitOutcomes respectively, normalized to that shape below.
function buildOutcomeGridCompact(hitKeys, cellsMode){
  const hitSet = new Set(hitKeys||[]);
  const cell = (label, key, title) => {
    const hit = hitSet.has(key);
    return `<div title="${esc(title)}" style="width:24px;height:24px;border-radius:.5vmin;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;position:relative;
      background:${hit?'var(--gold)':'rgba(255,255,255,.08)'};color:${hit?'#111':'#8a8a80'}">${label}${hit ? '<span aria-hidden="true" style="position:absolute;bottom:-1px;right:0;font-size:7px">✓</span>' : ''}</div>`;
  };
  if(cellsMode === 'numbers'){
    return `<div style="display:flex;flex-wrap:wrap;gap:3px">${Array.from({length:20},(_,i)=>i+1).map(n=>cell(String(n), `${n}:1`, 'Number '+n)).join('')}</div>`;
  }
  const numberCells = Array.from({length:20},(_,i)=>i+1).map(n=>
    `<div style="display:flex;gap:2px">${cell('S'+n,`${n}:1`,'Single '+n)}${cell('D'+n,`${n}:2`,'Double '+n)}${cell('T'+n,`${n}:3`,'Treble '+n)}</div>`
  ).join('');
  const specialCells = `<div style="display:flex;gap:2px">${cell('25',`25:1`,'Outer bull')}${cell('Bull',`25:2`,'Double bull')}${cell('Miss',`0:1`,'Miss')}</div>`;
  return `<div style="display:flex;flex-wrap:wrap;gap:3px">${numberCells}${specialCells}</div>`;
}

/* ---- per-game-type renderers ----
   The shell above (top bar, match bar, checkout strip, banners, achievement
   overlays, idle state, connection handling) is game-agnostic. Only the player
   cards and the between-leg summary cards differ by game type, so each game
   type gets its own small renderer here, looked up by s.gameType — X01's
   per-player cards and Cricket's shared chalkboard scorecard. A future game
   type (Baseball, etc.) plugs in the same way without touching either. */
const renderers = {
  x01: {
    card(p, i, s, L){
      const active = i===s.currentIndex;
      // H2H standing (sets/legs) now lives in the match bar above the grid, not here —
      // showing it twice was redundant, and the match bar's boxed chips are more legible.
      const standing = s.practice ? `Leg ${num(s.legNo)}` : '';
      let throwbox = '';
      if(active){
        const darts = Array.isArray(s.darts) ? s.darts : [];
        const slots = [0,1,2].map(k=>{
          const lab = darts[k];
          return `<div class="dart ${dartClass(lab)}">${lab ? esc(lab) : 'dart '+(k+1)}</div>`;
        }).join('');
        const co = s.checkout
          ? `<div class="checkout"><span class="lab">Checkout</span><span class="route">${esc(s.checkout).replace(/ /g,'  →  ')}</span></div>`
          : '';
        throwbox = `<div class="throwbox"><div class="darts">${slots}</div>${co}</div>`;
      }
      let flash = '';
      if(active && s.status==='bust') flash = `<div class="flash bust">BUST</div>`;
      if(active && s.status==='won')  flash = `<div class="flash shot">GAME SHOT</div>`;

      const dartCounts = !L.showDartCounts ? '' : `
          <div class="dart-counts">
            <div class="dart-counts-title">Darts Thrown</div>
            <div class="dart-count-row"><span class="dart-count-val">${num(p.legDarts)}</span><span class="dart-count-lbl">Leg</span></div>
            ${s.practice
              ? `<div class="dart-count-row"><span class="dart-count-val">${num(p.gameDarts)}</span><span class="dart-count-lbl">Session</span></div>`
              : `<div class="dart-count-row"><span class="dart-count-val">${num(p.setDarts)}</span><span class="dart-count-lbl">Set</span></div>
                 <div class="dart-count-row"><span class="dart-count-val">${num(p.gameDarts)}</span><span class="dart-count-lbl">Game</span></div>`
            }
          </div>`;
      const metaParts = [];
      if(L.showAverages) metaParts.push(`<span>leg <b>${p.legAvg!=null?esc(p.legAvg):'—'}</b></span><span>game <b>${p.gameAvg!=null?esc(p.gameAvg):'—'}</b></span>`);
      if(standing) metaParts.push(`<span class="standing">${standing}</span>`);
      const meta = (!L.showMeta || !metaParts.length) ? '' : `<div class="meta">${metaParts.join('')}</div>`;

      return `<div class="pcard ${active?'active':''}">
        ${flash}
        <div>
          <div class="prow1">
            <span class="pname">${escapeHtml(p.name)}</span>
            ${L.showTag ? `<span class="ptag">${p.out==='double'?'DOUBLE OUT':'SINGLE OUT'}</span>` : ''}
            ${p.startScore != null && String(p.startScore) !== String(s.category) ? `<span class="ptag" title="Handicap: started this leg from ${num(p.startScore)} instead of ${esc(s.category)}">STARTED ${num(p.startScore)}</span>` : ''}
            ${active?'<span class="throwflag">▸ throwing</span>':''}
          </div>
          <div class="score">${num(p.score)}</div>
          ${dartCounts}
        </div>
        ${meta}
        ${throwbox}
      </div>`;
    },
    summary(p){
      return `
      <div class="sum-card ${p.won?'winner':''}">
        <div class="sum-name">${escapeHtml(p.name)}${p.won?'<span class="sum-crown">🏆</span>':''}</div>
        <div class="sum-stats">
          <div class="sum-stat">
            <div class="sv">${p.avg!=null?esc(p.avg):'—'}</div>
            <div class="sl">Average</div>
          </div>
          <div class="sum-stat">
            <div class="sv">${num(p.darts)}</div>
            <div class="sl">Darts</div>
          </div>
          <div class="sum-stat">
            <div class="sv">${num(p.busts)}</div>
            <div class="sl">Busts</div>
          </div>
        </div>
      </div>`;
    }
  },
  cricket: {
    // A single shared chalkboard-style table (rows=numbers, columns=players)
    // rather than per-player cards — matches how cricket is scored on a real
    // board. Replaces the per-player marks-grid design used before.
    scorecard(s, L){
      const players = s.players;
      const active = s.currentIndex;
      const numberSet = new Set();
      players.forEach(p=>Object.keys(p.marks||{}).forEach(n=>numberSet.add(Number(n))));
      const nums = Array.from(numberSet).filter(n=>n!==25).sort((a,b)=>b-a);
      if(numberSet.has(25)) nums.push(25);

      const headCells = players.map((p,i)=>{
        const isActive = i===active;
        return `<div class="cs-col-head${isActive?' active':''}">
          <span>${escapeHtml(p.name)}</span>
          ${isActive?'<span class="cs-throw-chip">▸ throwing</span>':''}
        </div>`;
      }).join('');

      const bodyRows = nums.map(n=>{
        const lbl = n===25 ? 'Bull' : String(n);
        const cells = players.map((p,i)=>{
          const m = (p.marks && p.marks[n]) || 0;
          const isActive = i===active;
          return `<div class="cs-cell${isActive?' active':''}">${cricketMarkGlyph(m, lbl)}</div>`;
        }).join('');
        return `<div class="cs-row"><div class="cs-label">${lbl}</div>${cells}</div>`;
      }).join('');

      const pointCells = players.map((p,i)=>{
        const isActive = i===active;
        return `<div class="cs-cell${isActive?' active':''}"><span class="cs-points${isActive?' active':''}">${num(p.points)}</span></div>`;
      }).join('');

      const thrower = players[active];
      const darts = Array.isArray(s.darts) ? s.darts : [];
      const slots = [0,1,2].map(k=>{
        const lab = darts[k];
        return `<div class="dart ${dartClass(lab)}">${lab ? esc(lab) : 'dart '+(k+1)}</div>`;
      }).join('');
      // docs/cutthroat-cricket-roadmap.md: the one visible difference from
      // standard on this screen — everything else (marks grid, points cells)
      // renders identically either way.
      const ptsLabel = s.cricketVariant === 'cutthroat' ? 'Pts (lowest wins)' : 'Pts';

      return `<div class="cs-wrap" style="--cs-cols:${players.length}">
        <div class="cs-table">
          <div class="cs-row cs-head"><div class="cs-label"></div>${headCells}</div>
          ${bodyRows}
          <div class="cs-row cs-foot"><div class="cs-label">${ptsLabel}</div>${pointCells}</div>
        </div>
        <div class="cs-throw-row">
          <span class="cs-throw-lbl">${thrower?`<b>${escapeHtml(thrower.name)}</b> at the oche`:''}</span>
          <div class="darts">${slots}</div>
        </div>
      </div>`;
    },
    summary(p){
      return `
      <div class="sum-card ${p.won?'winner':''}">
        <div class="sum-name">${escapeHtml(p.name)}${p.won?'<span class="sum-crown">🏆</span>':''}</div>
        <div class="sum-stats">
          <div class="sum-stat">
            <div class="sv">${num(p.points)}</div>
            <div class="sl">Points</div>
          </div>
          <div class="sum-stat">
            <div class="sv">${num(p.closed)}</div>
            <div class="sl">Closed</div>
          </div>
        </div>
      </div>`;
    }
  },
  // Baseball (docs/game-modes-roadmap.md): same shared chalkboard-table shape as
  // Cricket's (rows=innings 1-9, columns=players) rather than per-player cards —
  // all players share one live inning, not independent per-player state.
  baseball: {
    scorecard(s, L){
      const players = s.players;
      const active = s.currentIndex;
      const inning = s.baseballInning || 1;
      const lastInning = Math.max(9, inning);
      const rows = [];
      for(let i=1;i<=lastInning;i++){
        const isCurrentInning = i===inning;
        const cells = players.map((p,pi)=>{
          const r = p.inningRuns && p.inningRuns[i];
          const isActive = pi===active && isCurrentInning;
          return `<div class="cs-cell${isActive?' active':''}">${r!=null?`<span class="cs-points">${num(r)}</span>`:''}</div>`;
        }).join('');
        rows.push(`<div class="cs-row"><div class="cs-label">${i}</div>${cells}</div>`);
      }

      const headCells = players.map((p,i)=>{
        const isActive = i===active;
        return `<div class="cs-col-head${isActive?' active':''}">
          <span>${escapeHtml(p.name)}</span>
          ${isActive?'<span class="cs-throw-chip">▸ throwing</span>':''}
        </div>`;
      }).join('');

      const totalCells = players.map((p,i)=>{
        const isActive = i===active;
        return `<div class="cs-cell${isActive?' active':''}"><span class="cs-points${isActive?' active':''}">${num(p.totalRuns)}</span></div>`;
      }).join('');

      const thrower = players[active];
      const darts = Array.isArray(s.darts) ? s.darts : [];
      const slots = [0,1,2].map(k=>{
        const lab = darts[k];
        return `<div class="dart ${dartClass(lab)}">${lab ? esc(lab) : 'dart '+(k+1)}</div>`;
      }).join('');

      return `<div class="cs-wrap" style="--cs-cols:${players.length}">
        <div class="cs-table">
          <div class="cs-row cs-head"><div class="cs-label"></div>${headCells}</div>
          ${rows.join('')}
          <div class="cs-row cs-foot"><div class="cs-label">Runs</div>${totalCells}</div>
        </div>
        <div class="cs-throw-row">
          <span class="cs-throw-lbl">${thrower?`<b>${escapeHtml(thrower.name)}</b> at the oche — Inning ${Math.min(inning,9)} of 9${inning>9?' (extra innings)':''}`:''}</span>
          <div class="darts">${slots}</div>
        </div>
      </div>`;
    },
    summary(p){
      return `
      <div class="sum-card ${p.won?'winner':''}">
        <div class="sum-name">${escapeHtml(p.name)}${p.won?'<span class="sum-crown">🏆</span>':''}</div>
        <div class="sum-stats">
          <div class="sum-stat">
            <div class="sv">${num(p.totalRuns)}</div>
            <div class="sl">Runs</div>
          </div>
        </div>
      </div>`;
    }
  },
  // Shanghai (docs/shanghai-roadmap.md): same shared chalkboard-table shape as
  // Baseball's own (rows=rounds 1-config.rounds, columns=players) — all players
  // share one live round, not independent per-player state. Row labels show the
  // round's own TARGET NUMBER (not the round index) so the live board matches
  // what's actually live to score against.
  shanghai: {
    scorecard(s, L){
      const players = s.players;
      const active = s.currentIndex;
      const maxRounds = s.shanghaiMaxRounds || 7;
      const round = s.shanghaiRound || 1;
      const lastRound = Math.max(maxRounds, round);
      const rows = [];
      for(let i=1;i<=lastRound;i++){
        const isCurrentRound = i===round;
        const target = i<=maxRounds ? i : maxRounds;
        const cells = players.map((p,pi)=>{
          const r = p.roundPoints && p.roundPoints[i];
          const isActive = pi===active && isCurrentRound;
          return `<div class="cs-cell${isActive?' active':''}">${r!=null?`<span class="cs-points">${num(r)}</span>`:''}</div>`;
        }).join('');
        rows.push(`<div class="cs-row"><div class="cs-label">${target}</div>${cells}</div>`);
      }

      const headCells = players.map((p,i)=>{
        const isActive = i===active;
        return `<div class="cs-col-head${isActive?' active':''}">
          <span>${escapeHtml(p.name)}</span>
          ${isActive?'<span class="cs-throw-chip">▸ throwing</span>':''}
        </div>`;
      }).join('');

      const totalCells = players.map((p,i)=>{
        const isActive = i===active;
        return `<div class="cs-cell${isActive?' active':''}"><span class="cs-points${isActive?' active':''}">${num(p.totalPoints)}</span></div>`;
      }).join('');

      const thrower = players[active];
      const darts = Array.isArray(s.darts) ? s.darts : [];
      const slots = [0,1,2].map(k=>{
        const lab = darts[k];
        return `<div class="dart ${dartClass(lab)}">${lab ? esc(lab) : 'dart '+(k+1)}</div>`;
      }).join('');

      return `<div class="cs-wrap" style="--cs-cols:${players.length}">
        <div class="cs-table">
          <div class="cs-row cs-head"><div class="cs-label"></div>${headCells}</div>
          ${rows.join('')}
          <div class="cs-row cs-foot"><div class="cs-label">Points</div>${totalCells}</div>
        </div>
        <div class="cs-throw-row">
          <span class="cs-throw-lbl">${thrower?`<b>${escapeHtml(thrower.name)}</b> at the oche — Round ${Math.min(round,maxRounds)} of ${maxRounds}${round>maxRounds?' (extra rounds)':''}`:''}</span>
          <div class="darts">${slots}</div>
        </div>
      </div>`;
    },
    summary(p){
      return `
      <div class="sum-card ${p.won?'winner':''}">
        <div class="sum-name">${escapeHtml(p.name)}${p.won?'<span class="sum-crown">🏆</span>':''}</div>
        <div class="sum-stats">
          <div class="sum-stat">
            <div class="sv">${num(p.totalPoints)}</div>
            <div class="sl">Points</div>
          </div>
        </div>
      </div>`;
    }
  },
  // Halve-It (docs/archive/halve-it-roadmap.md): same shared chalkboard-table
  // shape as Shanghai's own, with row labels showing the round's own TARGET
  // LABEL (e.g. "Double 7", "Bull") read from s.halveItTargets (the full
  // sequence, sent because this file has no shared scoring.js module to
  // derive per-round targets from) and cells showing the RUNNING TOTAL after
  // that round with a ½ marker on a halved round, mirroring index.html's own
  // renderGameHalveIt() exactly.
  halve_it: {
    scorecard(s, L){
      const players = s.players;
      const active = s.currentIndex;
      const targets = (s.halveItTargets && s.halveItTargets.length) ? s.halveItTargets : [{sector:20}];
      const maxRounds = targets.length;
      const round = s.halveItRound || 1;
      const lastRound = Math.max(maxRounds, round);
      const targetAt = i => targets[Math.min(i, maxRounds) - 1];
      const targetLabel = t => {
        if(!t) return '';
        const numLabel = t.sector === 25 ? 'Bull' : String(t.sector);
        if(!t.ring) return numLabel;
        const ringLabel = t.ring === 'double' ? 'Double' : t.ring === 'treble' ? 'Treble' : 'Single';
        return `${ringLabel} ${numLabel}`;
      };
      const rows = [];
      for(let i=1;i<=lastRound;i++){
        const isCurrentRound = i===round;
        const cells = players.map((p,pi)=>{
          const r = p.roundTotals && p.roundTotals[i];
          const halved = p.roundHalved && p.roundHalved[i];
          const isActive = pi===active && isCurrentRound;
          return `<div class="cs-cell${isActive?' active':''}">${r!=null?`<span class="cs-points">${halved?'½ ':''}${num(r)}</span>`:''}</div>`;
        }).join('');
        rows.push(`<div class="cs-row"><div class="cs-label">${escapeHtml(targetLabel(targetAt(i)))}</div>${cells}</div>`);
      }

      const headCells = players.map((p,i)=>{
        const isActive = i===active;
        return `<div class="cs-col-head${isActive?' active':''}">
          <span>${escapeHtml(p.name)}</span>
          ${isActive?'<span class="cs-throw-chip">▸ throwing</span>':''}
        </div>`;
      }).join('');

      const totalCells = players.map((p,i)=>{
        const isActive = i===active;
        return `<div class="cs-cell${isActive?' active':''}"><span class="cs-points${isActive?' active':''}">${num(p.total)}</span></div>`;
      }).join('');

      const thrower = players[active];
      const darts = Array.isArray(s.darts) ? s.darts : [];
      const slots = [0,1,2].map(k=>{
        const lab = darts[k];
        return `<div class="dart ${dartClass(lab)}">${lab ? esc(lab) : 'dart '+(k+1)}</div>`;
      }).join('');

      return `<div class="cs-wrap" style="--cs-cols:${players.length}">
        <div class="cs-table">
          <div class="cs-row cs-head"><div class="cs-label"></div>${headCells}</div>
          ${rows.join('')}
          <div class="cs-row cs-foot"><div class="cs-label">Total</div>${totalCells}</div>
        </div>
        <div class="cs-throw-row">
          <span class="cs-throw-lbl">${thrower?`<b>${escapeHtml(thrower.name)}</b> at the oche — Round ${Math.min(round,maxRounds)} of ${maxRounds}${round>maxRounds?' (extra rounds)':''}, target ${escapeHtml(targetLabel(targetAt(round)))}`:''}</span>
          <div class="darts">${slots}</div>
        </div>
      </div>`;
    },
    summary(p){
      return `
      <div class="sum-card ${p.won?'winner':''}">
        <div class="sum-name">${escapeHtml(p.name)}${p.won?'<span class="sum-crown">🏆</span>':''}</div>
        <div class="sum-stats">
          <div class="sum-stat">
            <div class="sv">${num(p.total)}</div>
            <div class="sl">Total</div>
          </div>
        </div>
      </div>`;
    }
  },
  // The Pressure Chamber (docs/archive/pressure-chamber-roadmap.md): same shared
  // cs-table chalkboard shape as Shanghai/Halve-It's own (rows=rounds
  // 1-config.rounds, columns=players), each settled cell showing an icon for
  // that round's outcome (✅ full / ➗ partial / ❌ miss). The full 15-round
  // card sequence rides in s.pressureChamberCards (this file has no shared
  // scoring.js module to derive per-round targets from, same reasoning
  // s.halveItTargets already documents) — a big banner below the table shows
  // the CURRENT round's target/modifier/flavor text, large and unmissable,
  // plus a live No Warmup countdown read from s.pressureChamberDeadline.
  pressure_chamber: {
    scorecard(s, L){
      const players = s.players;
      const active = s.currentIndex;
      const cards = Array.isArray(s.pressureChamberCards) ? s.pressureChamberCards : [];
      const maxRounds = cards.length || 15;
      const round = s.pressureChamberRound || 1;
      const lastRound = Math.max(maxRounds, round);
      const cardAt = i => cards[Math.min(i, maxRounds) - 1];
      const OUTCOME_ICON = { full:'✅', partial:'➗', miss:'❌' };
      const rows = [];
      for(let i=1;i<=lastRound;i++){
        const isCurrentRound = i===round;
        const c = cardAt(i);
        const cells = players.map((p,pi)=>{
          const r = p.roundResults && p.roundResults[i];
          const isActive = pi===active && isCurrentRound;
          return `<div class="cs-cell${isActive?' active':''}">${r?`<span class="cs-points">${OUTCOME_ICON[r]||''}</span>`:''}</div>`;
        }).join('');
        rows.push(`<div class="cs-row"><div class="cs-label">${i}</div>${cells}</div>`);
      }

      const headCells = players.map((p,i)=>{
        const isActive = i===active;
        return `<div class="cs-col-head${isActive?' active':''}">
          <span>${escapeHtml(p.name)}</span>
          ${isActive?'<span class="cs-throw-chip">▸ throwing</span>':''}
        </div>`;
      }).join('');

      const totalCells = players.map((p,i)=>{
        const isActive = i===active;
        return `<div class="cs-cell${isActive?' active':''}"><span class="cs-points${isActive?' active':''}">${num(p.totalCp)}</span></div>`;
      }).join('');

      const thrower = players[active];
      const darts = Array.isArray(s.darts) ? s.darts : [];
      const slots = [0,1,2].map(k=>{
        const lab = darts[k];
        return `<div class="dart ${dartClass(lab)}">${lab ? esc(lab) : 'dart '+(k+1)}</div>`;
      }).join('');

      const liveCard = cardAt(round);
      const noWarmup = liveCard && liveCard.modifier && liveCard.modifier.key === 'no_warmup';
      const remainingSec = (noWarmup && s.pressureChamberDeadline != null) ? Math.max(0, Math.ceil((s.pressureChamberDeadline - Date.now())/1000)) : null;
      const banner = liveCard ? `<div style="margin-top:10px;padding:12px;border:2px solid #c9a227;border-radius:10px;text-align:center;background:rgba(201,162,39,0.08)">
        <div style="font-size:22px;font-weight:800">${escapeHtml(liveCard.target.label)}</div>
        <div style="font-size:16px;font-weight:700;margin-top:4px">${escapeHtml(liveCard.modifier.icon)} ${escapeHtml(liveCard.modifier.label)}</div>
        <div style="font-style:italic;font-size:13px;color:#999;margin-top:2px">${escapeHtml(liveCard.modifier.flavor)}</div>
        ${remainingSec!=null?`<div style="margin-top:6px;font-size:20px;font-weight:800">${remainingSec}s</div>`:''}
      </div>` : '';

      return `<div class="cs-wrap" style="--cs-cols:${players.length}">
        <div class="cs-table">
          <div class="cs-row cs-head"><div class="cs-label"></div>${headCells}</div>
          ${rows.join('')}
          <div class="cs-row cs-foot"><div class="cs-label">CP</div>${totalCells}</div>
        </div>
        ${banner}
        <div class="cs-throw-row">
          <span class="cs-throw-lbl">${thrower?`<b>${escapeHtml(thrower.name)}</b> at the oche — Round ${Math.min(round,maxRounds)} of ${maxRounds}`:''}</span>
          <div class="darts">${slots}</div>
        </div>
      </div>`;
    },
    summary(p){
      return `
      <div class="sum-card ${p.won?'winner':''}">
        <div class="sum-name">${escapeHtml(p.name)}${p.won?'<span class="sum-crown">🏆</span>':''}</div>
        <div class="sum-stats">
          <div class="sum-stat">
            <div class="sv">${num(p.totalCp)}</div>
            <div class="sl">CP</div>
          </div>
          <div class="sum-stat">
            <div class="sv">${escapeHtml(p.rating||'')}</div>
            <div class="sl">Rating</div>
          </div>
        </div>
      </div>`;
    }
  },
  // Bob's 27 (docs/archive/practice-ladders-roadmap.md Part A): same shared
  // chalkboard-table shape as Cricket/Baseball's (rows=rounds D1-D20, one
  // column since it's always solo), just fixed at exactly 20 rows — no
  // "extra innings"-style dynamic extension the way Baseball's table needs.
  bobs_27: {
    scorecard(s, L){
      const p = s.players[0];
      const round = s.bobs27Round || 1;
      const rows = [];
      for(let r=1;r<=20;r++){
        const isCurrentRound = r===round;
        const result = p.roundResults && p.roundResults[r];
        const cellText = result==null ? '' : `<span class="cs-points">${result>0?'+'+num(result):'−'+num(r*2)}</span>`;
        rows.push(`<div class="cs-row"><div class="cs-label">D${r}</div><div class="cs-cell${isCurrentRound?' active':''}">${cellText}</div></div>`);
      }

      const darts = Array.isArray(s.darts) ? s.darts : [];
      const slots = [0,1,2].map(k=>{
        const lab = darts[k];
        return `<div class="dart ${dartClass(lab)}">${lab ? esc(lab) : 'dart '+(k+1)}</div>`;
      }).join('');

      return `<div class="cs-wrap" style="--cs-cols:1">
        <div class="cs-table">
          <div class="cs-row cs-head"><div class="cs-label"></div><div class="cs-col-head active"><span>${escapeHtml(p.name)}</span><span class="cs-throw-chip">▸ throwing</span></div></div>
          ${rows.join('')}
          <div class="cs-row cs-foot"><div class="cs-label">Score</div><div class="cs-cell"><span class="cs-points active">${num(p.running)}</span></div></div>
        </div>
        <div class="cs-throw-row">
          <span class="cs-throw-lbl"><b>${escapeHtml(p.name)}</b> at the oche — D${round}, running score ${num(p.running)}</span>
          <div class="darts">${slots}</div>
        </div>
      </div>`;
    },
    summary(p){
      return `
      <div class="sum-card ${p.won?'winner':''}">
        <div class="sum-name">${escapeHtml(p.name)}${p.won?'<span class="sum-crown">🏆</span>':''}</div>
        <div class="sum-stats">
          <div class="sum-stat">
            <div class="sv">${num(p.running)}</div>
            <div class="sl">Final Score</div>
          </div>
        </div>
      </div>`;
    }
  },
  // 121 Checkout Ladder (docs/archive/practice-ladders-roadmap.md Part B): solo drill,
  // always exactly one player/card — a genuine X01-shaped visit (double-out,
  // checkout hints, dart slots), just against a climbing/dropping target
  // instead of an opponent, so this mirrors x01's own card almost exactly —
  // swapping "Leg N" for "Target N · Attempt N" and Darts Thrown for a
  // visit-of-3 counter, since neither leg-scoped nor session-scoped darts is
  // as meaningful here as which visit of this attempt is live.
  checkout_ladder: {
    card(p, i, s, L){
      const active = i===s.currentIndex;
      const target = num(s.checkoutLadderTarget || 121);
      const visit = Math.min((s.checkoutLadderVisits||0)+1, 3);
      let throwbox = '';
      if(active){
        const darts = Array.isArray(s.darts) ? s.darts : [];
        const slots = [0,1,2].map(k=>{
          const lab = darts[k];
          return `<div class="dart ${dartClass(lab)}">${lab ? esc(lab) : 'dart '+(k+1)}</div>`;
        }).join('');
        const co = s.checkout
          ? `<div class="checkout"><span class="lab">Checkout</span><span class="route">${esc(s.checkout).replace(/ /g,'  →  ')}</span></div>`
          : '';
        throwbox = `<div class="throwbox"><div class="darts">${slots}</div>${co}</div>`;
      }
      let flash = '';
      if(active && s.status==='bust') flash = `<div class="flash bust">BUST</div>`;
      if(active && s.status==='won')  flash = `<div class="flash shot">TARGET CLEARED</div>`;

      const meta = !L.showMeta ? '' : `<div class="meta"><span class="standing">Target ${target} · Attempt ${num(s.legNo)} · Visit ${visit}/3</span></div>`;

      return `<div class="pcard ${active?'active':''}">
        ${flash}
        <div>
          <div class="prow1">
            <span class="pname">${escapeHtml(p.name)}</span>
            ${L.showTag ? `<span class="ptag">DOUBLE OUT</span>` : ''}
            ${active?'<span class="throwflag">▸ throwing</span>':''}
          </div>
          <div class="score">${num(p.score)}</div>
        </div>
        ${meta}
        ${throwbox}
      </div>`;
    },
    summary(p){
      return `
      <div class="sum-card">
        <div class="sum-name">${escapeHtml(p.name)}</div>
        <div class="sum-stats">
          <div class="sum-stat">
            <div class="sv">${num(p.legDarts)}</div>
            <div class="sl">Darts This Attempt</div>
          </div>
        </div>
      </div>`;
    }
  },
  // Killer (docs/archive/game-modes-roadmap.md "Killer"): elimination H2H, always
  // multiple players/cards (never scorecard-layout) — one card per player showing
  // their randomly-assigned number, lives-as-pips (mirrors index.html's own
  // renderGameKiller()), killer status, and kills. s.killerLives comes from
  // liveSnapshot()'s own killerLives field (index.html).
  killer: {
    card(p, i, s, L){
      const active = i===s.currentIndex && !p.eliminated;
      const livesTarget = num(s.killerLives) || 3;
      const lives = num(p.lives);
      const pips = Array.from({length: Math.max(lives, livesTarget)}, (_,k) =>
        `<span aria-hidden="true">${k < lives ? '●' : '○'}</span>`).join(' ');
      const flash = p.eliminated ? `<div class="flash bust">ELIMINATED</div>` : '';
      return `<div class="pcard ${active?'active':''}${p.eliminated?' bust':''}">
        ${flash}
        <div>
          <div class="prow1">
            <span class="pname">${escapeHtml(p.name)}</span>
            <span class="ptag">№ ${num(p.number)}${p.isKiller?' · 🔪 KILLER':''}</span>
            ${active?'<span class="throwflag">▸ throwing</span>':''}
          </div>
          <div class="score" aria-label="${lives} of ${livesTarget} lives">${pips || '—'}</div>
        </div>
        <div class="meta"><span class="standing">${num(p.kills)} kill${num(p.kills)===1?'':'s'}</span></div>
      </div>`;
    },
    summary(p){
      return `
      <div class="sum-card ${p.won?'winner':''}">
        <div class="sum-name">${escapeHtml(p.name)}${p.won?'<span class="sum-crown">🏆</span>':''}${p.eliminated?' <span style="opacity:.7">☠️</span>':''}</div>
        <div class="sum-stats">
          <div class="sum-stat">
            <div class="sv">№ ${num(p.number)}</div>
            <div class="sl">Number</div>
          </div>
          <div class="sum-stat">
            <div class="sv">${num(p.kills)}</div>
            <div class="sl">Kills</div>
          </div>
        </div>
      </div>`;
    }
  },
  // Doubles Practice (docs/game-modes-roadmap.md): solo drill, always exactly one
  // player/card — no legSummary, no scorecard, so this always goes through the
  // generic s.players.map(renderer.card) path below, same as X01.
  doubles_practice: {
    card(p, i, s, L){
      const active = i===s.currentIndex;
      const targets = Array.isArray(s.doublesTargets) ? s.doublesTargets : [];
      const targetLabel = targets.map(n => n===25 ? 'Bull' : 'D'+n).join(', ');
      const pct = p.roundDarts ? Math.round(p.roundHits/p.roundDarts*100) : 0;
      let flash = '';
      if(active && s.roundOver){
        flash = `<div class="flash bust">${s.roundEndReason==='so-close' ? 'SO CLOSE' : 'WRONG DOUBLE'}</div>`;
      }
      let throwbox = '';
      if(active && s.dpLastDart && !s.roundOver){
        throwbox = `<div class="throwbox"><div class="darts"><div class="dart ${dartClass(s.dpLastDart.label)}">${esc(s.dpLastDart.label)}</div></div></div>`;
      }
      return `<div class="pcard ${active?'active':''}">
        ${flash}
        <div>
          <div class="prow1">
            <span class="pname">${escapeHtml(p.name)}</span>
            ${active?'<span class="throwflag">▸ throwing</span>':''}
          </div>
          <div class="score">${num(p.roundHits)}</div>
          <div class="dart-counts">
            <div class="dart-counts-title">Practicing ${esc(targetLabel)}</div>
            <div class="dart-count-row"><span class="dart-count-val">${pct}%</span><span class="dart-count-lbl">This round</span></div>
            <div class="dart-count-row"><span class="dart-count-val">${num(p.roundDarts)}</span><span class="dart-count-lbl">Darts</span></div>
          </div>
        </div>
        <div class="meta"><span class="standing">Round ${num(s.legNo)}</span></div>
        ${throwbox}
      </div>`;
    }
  },
  // Just Chuckin' It (docs/game-modes-roadmap.md): solo, freeform, no rounds/legs
  // at all — always exactly one player/card, no legSummary, no scorecard, so this
  // always goes through the generic s.players.map(renderer.card) path below.
  // p.heatmap/p.sessionAvg come from index.html's playerSnapshotChuckin() — a
  // live, session-only tally (gradually fills in as the session progresses),
  // a separate concept from the lifetime heatmap the Player Profile fetches.
  chuckin: {
    card(p, i, s, L){
      const active = i===s.currentIndex;
      const pct = p.sessionDarts ? Math.round(p.sessionTrebles/p.sessionDarts*100) : 0;
      // docs/bug-roadmap.md BUG-12: p.sessionAvg comes straight from the /api/live
      // broadcast payload's per-player array, which ALLOWED_LIVE_KEYS deliberately
      // leaves unrestricted in shape — a non-numeric value here previously called
      // .toFixed(1) directly and threw inside renderState()'s render loop, freezing
      // the whole scoreboard on every subsequent live event. null/undefined is the
      // legitimate "no darts thrown yet this session" case (Number(null) is 0, NOT
      // NaN, so it has to be excluded explicitly rather than folded into the same
      // Number.isFinite() check as actual garbage) — Number.isFinite() then guards
      // everything else the same way num() already guards every other live-payload
      // numeric field in this file.
      const sessionAvgNum = p.sessionAvg == null ? null : Number(p.sessionAvg);
      const avgText = Number.isFinite(sessionAvgNum) ? sessionAvgNum.toFixed(1) : '—';
      let throwbox = '';
      if(active && s.chuckinLastDart){
        const treble = s.chuckinLastDart.isTreble ? '<span class="flash win" style="position:static;display:inline-block;margin-left:8px">TREBLE</span>' : '';
        throwbox = `<div class="throwbox"><div class="darts"><div class="dart ${dartClass(s.chuckinLastDart.label)}">${esc(s.chuckinLastDart.label)}</div></div>${treble}</div>`;
      }
      return `<div class="pcard ${active?'active':''}">
        <div class="chuckin-layout">
          <div class="chuckin-stats">
            <div class="prow1">
              <span class="pname">${escapeHtml(p.name)}</span>
              ${active?'<span class="throwflag">▸ throwing</span>':''}
            </div>
            <div class="score">${num(p.sessionDarts)}</div>
            <div class="dart-counts">
              <div class="dart-counts-title">Just chuckin' it</div>
              <div class="dart-count-row"><span class="dart-count-val">${avgText}</span><span class="dart-count-lbl">3-dart average</span></div>
              <div class="dart-count-row"><span class="dart-count-val">${pct}%</span><span class="dart-count-lbl">Trebles this session</span></div>
              <div class="dart-count-row"><span class="dart-count-val">${num(p.sessionTrebles)}</span><span class="dart-count-lbl">Trebles</span></div>
            </div>
            ${throwbox}
          </div>
          <div class="chuckin-board">${buildChuckinLiveHeatmap(p.heatmap||[])}</div>
        </div>
      </div>`;
    }
  },
  // Guided Around the Clock (docs/game-modes-roadmap.md): solo drill, always
  // exactly one player/card — no legSummary, no scorecard, goes through the
  // generic s.players.map(renderer.card) path, same as Doubles Practice/Chuckin.
  around_the_clock: {
    card(p, i, s, L){
      const active = i===s.currentIndex;
      const hitNumbers = Array.isArray(p.hitNumbers) ? p.hitNumbers : [];
      const hitKeys = hitNumbers.map(n=>`${n}:1`);
      let flash = '';
      if(active && s.roundOver){
        flash = `<div class="flash win">CLOCK COMPLETE</div>`;
      }
      let throwbox = '';
      if(active && s.atcLastDart && !s.roundOver){
        throwbox = `<div class="throwbox"><div class="darts"><div class="dart ${dartClass(s.atcLastDart.label)}">${esc(s.atcLastDart.label)}</div></div></div>`;
      }
      return `<div class="pcard ${active?'active':''}">
        ${flash}
        <div class="chuckin-layout">
          <div class="chuckin-stats">
            <div class="prow1">
              <span class="pname">${escapeHtml(p.name)}</span>
              ${active?'<span class="throwflag">▸ throwing</span>':''}
            </div>
            <div class="score">${num(p.hit)}<span style="font-size:0.4em;opacity:.7"> / 20</span></div>
            <div class="dart-counts">
              <div class="dart-counts-title">Around the Clock</div>
              <div class="dart-count-row"><span class="dart-count-val">${num(p.roundDarts)}</span><span class="dart-count-lbl">Darts this round</span></div>
            </div>
            ${throwbox}
          </div>
          <div class="chuckin-board">${buildOutcomeGridCompact(hitKeys, 'numbers')}</div>
        </div>
        <div class="meta"><span class="standing">Round ${num(s.legNo)}</span></div>
      </div>`;
    }
  },
  // Guided Around the World (docs/game-modes-roadmap.md): solo, no rounds/legs at
  // all — always exactly one player/card, same shape as Chuckin.
  around_the_world: {
    card(p, i, s, L){
      const active = i===s.currentIndex;
      const hitOutcomes = Array.isArray(p.hitOutcomes) ? p.hitOutcomes : [];
      let throwbox = '';
      if(active && s.atwLastDart){
        const newOutcome = s.atwLastDart.isNewLifetimeOutcome ? '<span class="flash win" style="position:static;display:inline-block;margin-left:8px">NEW!</span>' : '';
        throwbox = `<div class="throwbox"><div class="darts"><div class="dart ${dartClass(s.atwLastDart.label)}">${esc(s.atwLastDart.label)}</div></div>${newOutcome}</div>`;
      }
      return `<div class="pcard ${active?'active':''}">
        <div class="chuckin-layout">
          <div class="chuckin-stats">
            <div class="prow1">
              <span class="pname">${escapeHtml(p.name)}</span>
              ${active?'<span class="throwflag">▸ throwing</span>':''}
            </div>
            <div class="score">${num(p.progress)}<span style="font-size:0.4em;opacity:.7"> / 63</span></div>
            <div class="dart-counts">
              <div class="dart-counts-title">Around the World</div>
              <div class="dart-count-row"><span class="dart-count-val">${num(p.sessionDarts)}</span><span class="dart-count-lbl">Darts this session</span></div>
            </div>
            ${throwbox}
          </div>
          <div class="chuckin-board">${buildOutcomeGridCompact(hitOutcomes, 'all')}</div>
        </div>
      </div>`;
    }
  }
};
// Traditional chalkboard marks: blank (0), / (1), X (2), circled X (3+/closed).
// The circle is the accessibility signal (docs/accessibility-roadmap.md) — closed
// status never relies on color alone.
function cricketMarkGlyph(n, numberLabel){
  const sr = n>=3 ? `<span class="sr-only">${numberLabel} closed</span>` : (n>0 ? `<span class="sr-only">${numberLabel}: ${n} of 3 marks</span>` : '');
  if(n<=0) return sr;
  if(n===1) return `<span class="cs-mark cs-mark-1" aria-hidden="true">/</span>${sr}`;
  if(n===2) return `<span class="cs-mark cs-mark-2" aria-hidden="true">✕</span>${sr}`;
  return `<span class="cs-mark cs-mark-3" aria-hidden="true">✕</span>${sr}`;
}

/* ---- voice announcements ----
   Spoken call-outs using the browser's built-in speechSynthesis (SpeechSynthesisUtterance)
   plus a procedurally-synthesized splash effect (Web Audio API) for Big Fish — zero
   server involvement, zero external services, zero new dependencies, matching
   docs/voice-announcements-roadmap.md. Multi-language support is left entirely to
   whatever voice/locale the browser already provides (see
   docs/voice-announcements-i18n-roadmap.md for what a real i18n implementation would
   need beyond that). Off by default; each call-out type is independently toggleable
   from Settings -> Voice Announcements. */
let VOICE = { enabled:false, turnScore:true, noScore:true, checkoutReq:true, oneEighty:true, bigFish:true, matchProgress:true };
function voiceOn(key){ return !!(VOICE.enabled && VOICE[key]); }

// Sequential queue so overlapping events (e.g. a Big Fish that also wins the leg)
// speak/play one at a time instead of talking over each other.
const _announceQueue = [];
let _announcing = false;
function queueSpeech(chunks){ _announceQueue.push({ type:'speech', chunks }); _processQueue(); }
function queueSound(playFn){ _announceQueue.push({ type:'sound', play:playFn }); _processQueue(); }
function _processQueue(){
  if(_announcing || !_announceQueue.length) return;
  _announcing = true;
  const item = _announceQueue.shift();
  if(item.type === 'sound'){
    Promise.resolve().then(item.play).catch(()=>{}).then(()=>{ _announcing=false; _processQueue(); });
    return;
  }
  const chunks = item.chunks.slice();
  const speakNext = () => {
    if(!chunks.length){ _announcing=false; _processQueue(); return; }
    const c = chunks.shift();
    const u = new SpeechSynthesisUtterance(c.text);
    u.pitch = c.pitch; u.rate = c.rate; u.volume = c.volume;
    u.onend = speakNext; u.onerror = speakNext;
    speechSynthesis.speak(u);
  };
  speakNext();
}

function ordinal(n){
  n = Number(n) || 0;
  const v = n % 100;
  const suf = (v >= 11 && v <= 13) ? 'th' : ({1:'st',2:'nd',3:'rd'}[n % 10] || 'th');
  return n + suf;
}

// "One! Hundred! and! Eighty!!" — escalating pitch and slowing rate word-by-word.
// The Web Speech API can't bend pitch mid-utterance or reliably stretch a vowel
// ("eighhhhty"), so this simulates the drawn-out hype-announcer effect by queuing
// each word as its own utterance with a rising pitch and slower rate.
function announce180(){
  queueSpeech([
    { text:'One',     pitch:0.95, rate:0.85, volume:1.0 },
    { text:'Hundred', pitch:1.1,  rate:0.85, volume:1.0 },
    { text:'and',     pitch:1.25, rate:0.8,  volume:1.0 },
    { text:'Eighty!', pitch:1.5,  rate:0.65, volume:1.0 },
  ]);
}

// Procedurally-synthesized splash/flop effect (filtered decaying noise bursts) rather
// than a recorded audio file — keeps this dependency-free and licensing-free. Swap in
// a real sound file later by replacing this function's body if you'd rather.
let _actx = null;
function playBigFishSplash(){
  return new Promise(resolve=>{
    try{
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if(!Ctx) return resolve();
      const ctx = _actx || (_actx = new Ctx());
      const now = ctx.currentTime;
      const flop = (start, len, vol) => {
        const n = Math.max(1, Math.floor(ctx.sampleRate * len));
        const buf = ctx.createBuffer(1, n, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for(let i=0;i<n;i++) data[i] = (Math.random()*2-1) * (1 - i/n);
        const src = ctx.createBufferSource(); src.buffer = buf;
        const filter = ctx.createBiquadFilter(); filter.type='bandpass'; filter.frequency.value=900; filter.Q.value=0.6;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(vol, now+start);
        gain.gain.exponentialRampToValueAtTime(0.001, now+start+len);
        src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
        src.start(now+start);
      };
      flop(0, 0.28, 0.5); flop(0.32, 0.22, 0.35); flop(0.58, 0.18, 0.25);
      setTimeout(resolve, 900);
    }catch(e){ resolve(); }
  });
}

let _lastTurnEventTs = 0, _lastCheckoutTurnSeq = -1, _lastMatchResultTs = 0, _lastLegStartTs = 0;
function handleVoiceEvents(s){
  if(!VOICE.enabled) return;

  if(s.lastTurnEvent && s.lastTurnEvent.ts !== _lastTurnEventTs){
    _lastTurnEventTs = s.lastTurnEvent.ts;
    const ev = s.lastTurnEvent;
    if(!ev.win){   // a winning turn is narrated by matchResult below instead
      if(ev.bust || ev.scored === 0){
        if(voiceOn('noScore')) queueSpeech([{ text:'No Score', pitch:0.65, rate:0.85, volume:0.9 }]);
      } else if(ev.scored === 180){
        if(voiceOn('oneEighty')) announce180();
      } else if(voiceOn('turnScore')){
        queueSpeech([{ text:String(ev.scored), pitch:1.0, rate:1.0, volume:1.0 }]);
      }
    }
  }

  if(s.checkoutTarget && s.turnSeq !== _lastCheckoutTurnSeq){
    _lastCheckoutTurnSeq = s.turnSeq;
    if(voiceOn('checkoutReq')){
      const ct = s.checkoutTarget;
      queueSpeech([{ text:`${ct.player}, you require ${ct.score}`, pitch:1.0, rate:0.95, volume:1.0 }]);
    }
  }

  if(s.matchResult && s.matchResult.ts !== _lastMatchResultTs){
    _lastMatchResultTs = s.matchResult.ts;
    const mr = s.matchResult;
    if(voiceOn('matchProgress')){
      const phrase = mr.kind === 'leg' ? `Game shot! And the ${ordinal(mr.legNo)} leg, ${mr.winner}!`
        : mr.kind === 'set' ? `Game shot! And the ${ordinal(mr.setNo)} set, ${mr.winner}!`
        : `Game shot! And the match, ${mr.winner}!`;
      queueSpeech([{ text:phrase, pitch:1.1, rate:1.0, volume:1.0 }]);
    }
    if(mr.bigFish && voiceOn('bigFish')) queueSound(playBigFishSplash);
  }

  if(s.legStart && s.legStart.ts !== _lastLegStartTs){
    _lastLegStartTs = s.legStart.ts;
    if(voiceOn('matchProgress')){
      queueSpeech([{ text:`${s.legStart.starter} to throw first, Game On!`, pitch:1.1, rate:1.05, volume:1.0 }]);
    }
  }
}

// Most browsers block audio (speech synthesis and Web Audio alike) until the page
// has had a user gesture. /display is typically left open on a TV with nobody
// touching it, so surface a one-tap prompt to unlock audio rather than silently
// having the first few announcements never be heard.
const voiceUnlock = document.createElement('button');
voiceUnlock.textContent = '🔊 Tap to enable voice announcements';
voiceUnlock.style.cssText = 'position:fixed;bottom:2vmin;right:2vmin;z-index:40;padding:1.2vmin 2vmin;'+
  'border-radius:1vmin;border:1px solid var(--gold);background:var(--surface-2);color:var(--gold);'+
  'font:inherit;font-size:1.6vmin;cursor:pointer';
voiceUnlock.hidden = true;
document.body.appendChild(voiceUnlock);
voiceUnlock.addEventListener('click', ()=>{
  try{ const Ctx = window.AudioContext || window.webkitAudioContext; if(Ctx) (_actx || (_actx = new Ctx())).resume(); }catch(e){}
  try{ speechSynthesis.speak(new SpeechSynthesisUtterance('')); }catch(e){}
  voiceUnlock.hidden = true;
});
fetch('/api/settings/voice-announcements', {cache:'no-store'}).then(r=>r.ok?r.json():null).then(s=>{
  if(s) VOICE = s;
  if(VOICE.enabled) voiceUnlock.hidden = false;
}).catch(()=>{});

function render(s){
  lastSnapshot = s;
  if(!s || !s.active){
    grid.classList.add('hidden'); idle.classList.remove('hidden');
    fmtEl.innerHTML=''; banner.classList.remove('show'); bannerKey='';
    gameStats.classList.add('hidden');
    coStrip.classList.add('hidden'); lastCoKey='';
    matchbar.classList.add('hidden');
    return;
  }

  idle.classList.add('hidden'); grid.classList.remove('hidden');
  if(!Array.isArray(s.players)) s.players = [];   // tolerate malformed snapshots
  fmtEl.innerHTML = fmtText(s);

  const renderer = renderers[s.gameType] || renderers.x01;
  const L = LAYOUTS[layout] || LAYOUTS.full;

  // 180s + Big Fish in top bar (Full layout only — secondary info on Compact/Minimal)
  if(L.showGameStats){
    gameStats.classList.remove('hidden');
    stat180s.textContent  = s.gameOneEighties ?? 0;
    statBF.textContent    = s.gameBigFish     ?? 0;
    statBusts.textContent = s.gameBusts       ?? 0;
  } else {
    gameStats.classList.add('hidden');
  }

  // checkout strip — show when player is on a finish
  // s.checkout is already '' when bust/won/no-finish, so no status check needed
  const thrower = s.players[s.currentIndex];
  const hasCheckout = !!s.checkout && !s.legSummary;
  if(hasCheckout){
    const route = s.checkout.replace(/ /g, '  →  ');
    if(route !== lastCoKey){
      lastCoKey = route;
      coRoute.textContent = route;
      coWho.textContent   = thrower ? thrower.name + ' at the oche' : '';
      coStrip.classList.remove('flashpulse'); void coStrip.offsetWidth; coStrip.classList.add('flashpulse');
    }
    coStrip.classList.remove('hidden');
  } else {
    coStrip.classList.add('hidden');
    lastCoKey = '';
  }

  // match bar — sets/legs standings, hidden in practice mode or solo play
  const showMatchbar = !s.practice && s.players && s.players.length > 1;
  if(showMatchbar){
    matchbar.classList.remove('hidden');
    const showSets = num(s.setsPerGame) > 1;
    const showLegs = showSets || num(s.legsPerSet) > 1;
    matchbar.innerHTML = s.players.map((p,i)=>{
      const active = i===s.currentIndex;
      const chips = [
        showSets ? `<div class="mb-stat"><span class="v">${num(p.setsWon)}</span><span class="l">Sets</span></div>` : '',
        showLegs ? `<div class="mb-stat"><span class="v">${num(p.legsWon)}${showSets?'':'/'+num(s.legsPerSet)}</span><span class="l">Legs</span></div>` : '',
      ].join('');
      return `<div class="mb-row ${active?'active':''}">
        <span class="mb-turn">${active?'▸':''}</span>
        <span class="mb-name">${escapeHtml(p.name)}</span>
        <div class="mb-stats">${chips}</div>
      </div>`;
    }).join('');
  } else {
    matchbar.classList.add('hidden');
  }

  const n = s.players.length;
  // Portrait is narrow and tall — stacking cards single-column gives each one full
  // width (readable at a glance) instead of the side-by-side columns that make sense
  // in landscape's wide-and-short shape but cram score text into narrow cells here.
  // The cricket/baseball scorecards are always a single table spanning the whole
  // grid, not per-player columns, regardless of orientation.
  const isScorecardLayout = (s.gameType === 'cricket' || s.gameType === 'baseball' || s.gameType === 'shanghai' || s.gameType === 'halve_it' || s.gameType === 'pressure_chamber' || s.gameType === 'bobs_27') && !s.legSummary;
  const cols = isScorecardLayout ? 1 : (isPortrait ? 1 : (n<=1 ? 1 : n<=4 ? 2 : 3));
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

  if(s.legSummary){
    grid.innerHTML = s.legSummary.map(p=>renderer.summary(p, L)).join('');
  } else if(isScorecardLayout){
    grid.innerHTML = renderer.scorecard(s, L);
  } else {
    grid.innerHTML = s.players.map((p,i)=>renderer.card(p, i, s, L)).join('');
  }

  // achievement flashes (180, Big Fish, nine-darter)
  if(s.achievement && s.achievement.ts){
    if(s.achievement.ts !== lastAchTs){
      lastAchTs = s.achievement.ts;
      lastAchCountText = s.achievement.countText || '';
      showAchievement(s.achievement.type, s.achievement.player, s.achievement.countText);
    } else if((s.achievement.countText || '') !== lastAchCountText && achOverlay.classList.contains('show')){
      // Same achievement, a later push once the award count resolved — patch
      // the count in place rather than restarting the reveal/confetti.
      lastAchCountText = s.achievement.countText || '';
      if(achCount) achCount.textContent = lastAchCountText;
    }
  }

  handleVoiceEvents(s);

  // result banners (leg / set / game) — show once per message
  if(s.message && s.message !== bannerKey){
    bannerKey = s.message;
    document.getElementById('banner-big').textContent = s.done ? 'GAME OVER' : s.message;
    document.getElementById('banner-sub').textContent = s.done ? s.message
      : s.message.includes(' the set') ? 'next set coming up'
      : 'next leg coming up';
    banner.classList.add('show');
    if(!s.done){ clearTimeout(bannerTimer); bannerTimer = setTimeout(()=>banner.classList.remove('show'), 3500); }
  } else if(!s.message && !s.done){
    // A message-less snapshot clears the banner (e.g. play resuming next leg). Guard on
    // !s.done so the persistent GAME OVER banner isn't dismissed by a trailing
    // achievement broadcast (which carries message:'' but keeps done:true) — it stays
    // up until a new game actually starts (done:false).
    bannerKey=''; banner.classList.remove('show');
  }
}

function setLive(on){
  dot.classList.toggle('off', !on);
  liveTx.textContent = on ? 'live' : 'reconnecting…';
}

/* ---- connect to the live stream (with polling fallback) ---- */
let usePoll = false, pollTimer = null;
function startPolling(){
  if(usePoll) return; usePoll = true; setLive(false);
  const tick = async () => {
    try { const r = await fetch('/api/live', {cache:'no-store'}); if(r.ok){ setLive(true); render(await r.json()); } else setLive(false); }
    catch(e){ setLive(false); }
  };
  tick(); pollTimer = setInterval(tick, 1500);
}
function connect(){
  if(typeof EventSource === 'undefined') return startPolling();
  let es;
  try { es = new EventSource('/api/live/stream'); }
  catch(e){ return startPolling(); }
  let errCount = 0;
  es.onopen = () => { setLive(true); errCount = 0; };
  es.onmessage = (ev) => { setLive(true); errCount = 0; try { render(JSON.parse(ev.data)); } catch(e){} };
  es.onerror = () => {
    setLive(false);
    errCount++;
    // A fatal close (readyState CLOSED) means the browser won't auto-retry — this is
    // what happens when the server rejects the stream with a non-2xx (e.g. the 503
    // connection-cap response). Fall back to polling immediately rather than waiting
    // for 3 retries that will never come. Transient drops keep readyState CONNECTING,
    // so those still get the auto-reconnect + 3-strikes behaviour.
    if(errCount >= 3 || es.readyState === EventSource.CLOSED){ es.close(); startPolling(); }
  };
}

function escapeHtml(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
// The live snapshot arrives from an unauthenticated POST /api/live, so every field
// is treated as untrusted: strings are HTML-escaped, numeric fields are coerced.
function esc(v){ return escapeHtml(v == null ? '' : String(v)); }
function num(v){ return Number(v) || 0; }

fetch('/api/live', {cache:'no-store'}).then(r=>r.ok?r.json():null).then(s=>{ if(s) render(s); }).catch(()=>{});
connect();
</script>
