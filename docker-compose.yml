# See "Exposing this to the internet" in README.md before putting this behind
# anything other than a trusted LAN.
services:
  darts:
    build: .
    container_name: oche
    ports:
      - "8046:8046"          # open http://<your-server>:8046 in a browser
    volumes:
      - ./darts_data:/data   # the SQLite database is stored here on your server
    environment:
      - PORT=8046
      - DARTS_DB=/data/darts.db
      # Set to "true" if this app is served over HTTPS (e.g. behind a reverse proxy),
      # so the admin session cookie gets the Secure flag. Leave unset/false for plain
      # HTTP / LAN-only deployments.
      - COOKIE_SECURE=false
      # Requires an admin login for every write (players, games, turns, badges, live
      # feed) — reads stay public. This is a zero-trust default: true even for a
      # trusted-looking LAN device. Set to "false" only for a fully-trusted household
      # network where you'd rather skip the one-time admin login per device. See
      # README.md "Locking down writes" and "Exposing this to the internet".
      - OCHE_REQUIRE_AUTH=true
      # Only set to "true" if this container sits behind a reverse proxy YOU control
      # that sets X-Forwarded-For — otherwise leave unset, since honoring that header
      # from an untrusted source would let a client spoof its way around per-IP rate
      # limiting.
      # - TRUST_PROXY=true
      # Only set to "true" to additionally block outbound Home Assistant requests to
      # private/LAN address ranges (loopback and link-local/metadata addresses are
      # always blocked regardless). Leave unset for a normal LAN-hosted HA instance.
      # - HA_BLOCK_PRIVATE=true
    # The container runs as a non-root user (see Dockerfile / docker-entrypoint.sh).
    # no-new-privileges is safe to add unconditionally; a full read-only root
    # filesystem / cap_drop:[ALL] were deliberately NOT added here — the entrypoint
    # needs to run as root briefly to chown a freshly bind-mounted ./darts_data on
    # first run (see docker-entrypoint.sh), which needs CAP_CHOWN, and getting the
    # exact minimal capability set right isn't something to guess at without testing
    # against a real deployment.
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
