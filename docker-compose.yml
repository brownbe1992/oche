services:
  darts:
    build: .
    container_name: oche
    ports:
      - "8046:8046"          # open http://<your-server>:8046 in a browser
    volumes:
      - ./darts_data:/data   # the SQLite database is stored here on your server
    environment:
      - PORT=8046
      - DARTS_DB=/data/darts.db
      # Set to "true" if this app is served over HTTPS (e.g. behind a reverse proxy),
      # so the admin session cookie gets the Secure flag. Leave unset/false for plain
      # HTTP / LAN-only deployments.
      - COOKIE_SECURE=false
    restart: unless-stopped
