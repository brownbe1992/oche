services:
  darts:
    build: .
    container_name: darts-scorer
    ports:
      - "8046:8046"          # open http://<your-server>:8046 in a browser
    volumes:
      - ./darts_data:/data   # the SQLite database is stored here on your server
    environment:
      - PORT=8046
      - DARTS_DB=/data/darts.db
    restart: unless-stopped
